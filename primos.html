<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encontrar número primo</title>
    <link rel="shortcut icon" href="./img/primos.png" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body
    class="relative min-h-screen w-full overflow-x-hidden font-sans text-[#f4d35e] bg-[#102a2a] flex items-center justify-center">
    <div
        class="pointer-events-none absolute -left-10 -top-14 z-0 h-44 w-44 sm:h-56 sm:w-56 rounded-full bg-[#d4af37] opacity-20 blur-2xl animate-pulse">
    </div>
    <div
        class="pointer-events-none absolute -right-20 top-1/3 z-0 h-48 w-48 sm:h-60 sm:w-60 rounded-full bg-[#f4d35e] opacity-20 blur-2xl">
    </div>
    <div
        class="pointer-events-none absolute -bottom-14 left-1/3 z-0 h-40 w-40 sm:h-52 sm:w-52 rounded-full bg-[#d4af37] opacity-10 blur-2xl">
    </div>
    <main
        class="relative z-10 flex flex-col justify-center items-center w-full grow px-2 sm:px-6 md:px-12 py-4 sm:py-8 md:py-12">
        <section
            class="mx-auto w-full max-w-2xl rounded-2xl px-4 sm:px-8 py-6 sm:py-10 text-[#f4d35e] bg-[#0d3640] border border-[#d4af37]/80 shadow-2xl shadow-black/30">
            <h1
                class="text-center text-base sm:text-2xl md:text-3xl font-extrabold text-[#d4af37] mb-2 sm:mb-5 tracking-tight leading-tight break-words px-1">
                Encontrar el primer número primo en un array
            </h1>
            <form class="space-y-4" onsubmit="return false;">
                <label class="block mb-2 font-medium text-[#d4af37] text-base sm:text-lg" for="arrayInput">Array
                    generado aleatoriamente (10 números entre 2 y 50):</label>
                <div class="flex flex-col sm:flex-row gap-3 items-stretch">
                    <input
                        class="w-full px-3 py-2 border border-[#d4af37]/40 rounded focus:outline-none focus:ring-2 focus:ring-[#d4af37] bg-[#0d3640]/70 text-[#f4d35e] placeholder:text-[#d4af37]"
                        type="text" id="arrayInput" readonly>
                    <button type="button" onclick="generarArrayAleatorio()"
                        class="bg-[#f4d35e]/90 text-[#102a2a] font-semibold rounded-xl px-4 py-2 transition-all duration-300 ease-in-out hover:bg-[#d5e8c2] hover:text-black focus:outline-none focus:ring-2 focus:ring-[#d4af37] text-sm">Regenerar</button>
                </div>
                <button
                    class="block mx-auto my-8 bg-[#f4d35e]/90 text-[#102a2a] font-semibold rounded-xl px-8 py-4 transition-all duration-300 ease-in-out hover:bg-[#d5e8c2] hover:text-black focus:outline-none focus:ring-2 focus:ring-[#d4af37]"
                    type="button" onclick="buscarPrimo()">Buscar primer número primo</button>
                <p id="resultadoPrimo" class="text-center text-lg font-semibold"></p>
                <a href="index.html"
                    class="block mx-auto my-4 bg-transparent border border-[#d4af37]/40 text-[#d4af37] font-semibold rounded-xl px-8 py-4 transition-all duration-300 ease-in-out hover:bg-[#f4d35e] hover:text-black focus:outline-none focus:ring-2 focus:ring-[#d4af37] text-center w-fit">Regresar
                    a inicio</a>
                <script>
                    // Generar array aleatorio y mostrarlo en el input
                    function generarArrayAleatorio() {
                        const arr = Array.from({ length: 10 }, () => Math.floor(Math.random() * 49) + 2);
                        document.getElementById('arrayInput').value = arr.join(', ');
                    }
                    window.addEventListener('DOMContentLoaded', generarArrayAleatorio);
                </script>
            </form>
        </section>
    </main>
    <script src="./js/primos.js"></script>
</body>

</html>
